name: UC_ModeImager
image_analyzer: image_analysis.analyzers.beam_analyzer.BeamAnalyzer
image:
  type: camera
  bit_depth: 16
  description: imager of main laser driver
  background:
    method: constant
    constant_level: 100.0
  metadata:
    location: B-cave
    notes: none
    spatial_calibration: 2.44e-05
  thresholding:
    method: constant
    value: 0.0
    mode: to_zero
    invert: false
  filtering:
    gaussian_sigma: null
    median_kernel_size: 3
  pipeline:
    steps:
    - background
    - thresholding
    - filtering
scan:
  priority: 20
  mode: per_shot
  save: true
