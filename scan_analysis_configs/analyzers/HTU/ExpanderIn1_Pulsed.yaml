name: UC_ExpanderIn1_Pulsed
image_analyzer: image_analysis.analyzers.beam_analyzer.BeamAnalyzer
image:
  type: camera
  bit_depth: 16
  description: IR mode at the input to amp2
  background:
    method: constant
    constant_level: 225.0
  metadata:
    location: Room 148
    notes: none
    spatial_calibration: 2.44e-05
  roi:
    x_min: 100
    x_max: 450
    y_min: 100
    y_max: 450
  thresholding:
    method: constant
    value: 0.0
    mode: to_zero
    invert: false
  pipeline:
    steps:
    - background
    - roi
    - thresholding
scan:
  priority: 22
  mode: per_shot
  save: true
