name: UC_VisaEBeam7
image_analyzer: image_analysis.analyzers.beam_analyzer.BeamAnalyzer
image:
  type: camera
  bit_depth: 16
  description: e beam profile on visa 7 screen
  background:
    method: from_file
    file_path: '{scan_dir}/computed_background.npy'
    constant_level: 50.0
    additional_constant: 2
  metadata:
    spatial_calibration: 7.5e-06
  crosshair_masking:
    crosshairs:
    - angle: -8
      center:
      - 275
      - 328
      height: 108
      thickness: 10
      width: 108
    - angle: -8
      center:
      - 275
      - 550
      height: 108
      thickness: 10
      width: 108
  roi:
    x_max: 453
    x_min: 120
    y_max: 433
    y_min: 100
  transforms:
    flip_horizontal: false
    flip_vertical: false
    rotation_angle: -8.0
  pipeline:
    steps:
    - background
    - crosshair_masking
    - roi
    - transforms
scan:
  priority: 1
  mode: per_shot
  save: true
  gdoc_slot: 0
