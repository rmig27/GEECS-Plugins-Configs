name: UC_Amp4_IR_Input
image_analyzer: beam
image:
  bit_depth: 16
  description: Image analyzer to calcuate basic statistics of the IR laser beam profile
    at the input to amp4.
  background:
    enabled: true
    method: constant
    constant_level: 90.0
  metadata:
    location: Room 148
    notes: none
    spatial_calibration: 2.44e-05
  roi:
    x_max: 600
    x_min: 1
    y_max: 600
    y_min: 1
  thresholding:
    enabled: true
    method: constant
    value: 0.0
    mode: to_zero
    invert: false
scan:
  priority: 30
  mode: per_shot
  save: true
