name: UC_UndulatorRad2
image_analyzer: image_analysis.analyzers.beam_analyzer.BeamAnalyzer
image:
  type: camera
  description: Undulator radiation diagnostic
  bit_depth: 16
  roi:
    x_min: 0
    x_max: 10000
    y_min: 0
    y_max: 100000
  background: null
  crosshair_masking: null
  circular_mask: null
  vignette: null
  thresholding: null
  filtering:
    gaussian_sigma: null
    median_kernel_size: null
  normalization: null
  transforms:
    rotation_angle: 0.0
    flip_horizontal: false
    flip_vertical: false
    distortion_correction: false
    distortion_coeffs: null
  pipeline:
    steps:
    - roi
    - filtering
    - transforms
  analysis: null
scan:
  priority: 2
  mode: per_shot
  save: true
  gdoc_slot: 1
