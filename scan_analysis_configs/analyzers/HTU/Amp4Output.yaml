name: UC_Amp4_IR_output
image_analyzer: image_analysis.analyzers.beam_analyzer.BeamAnalyzer
image:
  type: camera
  bit_depth: 16
  description: IR mode at the input to amp3
  background:
    method: constant
    constant_level: 90.0
  metadata:
    location: Room 148
    notes: none
    spatial_calibration: 2.44e-05
  thresholding:
    method: constant
    value: 0.0
    mode: to_zero
    invert: false
  pipeline:
    steps:
    - background
    - thresholding
scan:
  priority: 31
  mode: per_shot
  save: false
