name: UC_VisaEBeam5
image_analyzer: image_analysis.analyzers.beam_analyzer.BeamAnalyzer
image:
  type: camera
  bit_depth: 16
  description: e beam profile on visa 5 screen
  background:
    method: from_file
    file_path: '{scan_dir}/computed_background.npy'
    constant_level: 50.0
    additional_constant: 2
  metadata:
    spatial_calibration: 7.5e-06
  crosshair_masking:
    crosshairs:
    - angle: 0
      center:
      - 267
      - 95
      height: 108
      thickness: 10
      width: 108
    - angle: 0
      center:
      - 262
      - 440
      height: 108
      thickness: 10
      width: 108
  roi:
    x_max: 468
    x_min: 135
    y_max: 423
    y_min: 90
  pipeline:
    steps:
    - background
    - crosshair_masking
    - roi
scan:
  priority: 1
  mode: per_shot
  save: true
  gdoc_slot: 0
