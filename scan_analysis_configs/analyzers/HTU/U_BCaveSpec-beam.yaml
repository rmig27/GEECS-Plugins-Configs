name: U_BCaveMagSpec
image_analyzer: beam
image:
  bit_depth: 16
  description: B-Cave magnetic spectrometer camera for electron beam profiling
  background:
    enabled: true
    method: constant
    constant_level: 1.0
  crosshair_masking:
    crosshairs: []
    enabled: false
  filtering:
    gaussian_sigma: null
    median_kernel_size: null
  metadata:
    location: B-cave
    notes: NA
    spatial_calibration: 2.217e-05
  roi:
    x_max: 300
    x_min: 50
    y_max: 180
    y_min: 1
  thresholding:
    enabled: true
    invert: false
    method: constant
    mode: to_zero
    value: 0.0
  analysis:
    compute_slopes: true
scan:
  priority: 3
  mode: per_bin
  save: true
