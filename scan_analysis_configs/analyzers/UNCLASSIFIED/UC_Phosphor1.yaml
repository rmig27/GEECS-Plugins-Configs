name: UC_Phosphor1
description: ''
bit_depth: 16
roi:
  x_min: 0
  x_max: 1200
  y_min: 4
  y_max: 960
background:
  enabled: true
  method: from_file
  file_path: '{scan_dir}\computed_background.npy'
  constant_level: 0.0
  additional_constant: 10.0
  dynamic_computation:
    enabled: true
    method: percentile_dataset
    percentile: 15.0
    auto_save_path: '{scan_dir}\computed_background.npy'
  background_scan_number: null
crosshair_masking: null
circular_mask:
  enabled: true
  center:
  - 700
  - 475
  radius: 450
  mask_outside: true
  mask_value: 0.0
vignette: null
thresholding: null
filtering:
  gaussian_sigma: null
  median_kernel_size: 3
normalization: null
transforms:
  rotation_angle: 0.0
  flip_horizontal: false
  flip_vertical: false
  distortion_correction: false
  distortion_coeffs: null
pipeline:
  steps:
  - background
  - roi
  - circular_mask
  - filtering
  - transforms
analysis: null
