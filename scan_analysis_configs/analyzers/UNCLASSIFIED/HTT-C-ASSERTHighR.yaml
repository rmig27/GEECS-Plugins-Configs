# Configuration for HTT-C-ASSERTHighR camera
name: HTT-C-ASSERTHighR
image_analyzer: image_analysis.analyzers.beam_analyzer.BeamAnalyzer

image:
  type: camera
  description: high resolution for electron beam profile analysis
  bit_depth: 16

  background:
    enabled: true
    method: constant
    constant_level: 100.0

  thresholding:
    enabled: true
    method: constant
    value: 0.0
    mode: to_zero
    invert: false

  roi:
    x_min: 675
    y_min: 100
    x_max: 975
    y_max: 300

  crosshair_masking:
    enabled: false
    crosshairs: []

  filtering:
    gaussian_sigma: null
    median_kernel_size: null

  transforms:
    rotation_angle: 0.0
    flip_horizontal: false
    flip_vertical: false

  analysis:
    enabled_stats:
      - image_total
      - x_CoM
      - y_CoM

  metadata:
    spatial_calibration: 0.000019
    location: HTT target chamber
    notes: NA