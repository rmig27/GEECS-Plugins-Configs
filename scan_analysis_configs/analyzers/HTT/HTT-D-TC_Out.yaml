name: HTT-D-TC_Out
image_analyzer: image_analysis.analyzers.beam_analyzer.BeamAnalyzer
image:
  type: camera
  bit_depth: 16
  description: Output of target chamber
  background:
    method: constant
    constant_level: 1
  metadata:
    location: B cave chamber
    notes: none
    spatial_calibration: 1
  thresholding:
    method: constant
    value: 0.0
    mode: to_zero
    invert: false
  roi:
    x_min: 600
    x_max: 1100
    y_min: 300
    y_max: 700
  pipeline:
    steps:
    - roi
    - background
    - thresholding
scan:
  priority: 100
  mode: per_shot
  save: false
