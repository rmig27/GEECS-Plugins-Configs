name: HTT-C23_3_MagSpec3
image_analyzer: image_analysis.analyzers.magspec_manual_calib_analyzer.MagSpecManualCalibAnalyzer
image:
  type: camera
  description: High power mode imager
  camera_type: ebeam_profile
  bit_depth: 16
  background:
    method: null
    additional_constant: 1.0
  thresholding:
    method: constant
    value: 0.0
    mode: to_zero
    invert: false
  roi:
    x_min: 139
    x_max: 750
    y_min: 44
    y_max: 225
  filtering:
    gaussian_sigma: null
    median_kernel_size: 5
  transforms:
    rotation_angle: 0.2
    flip_horizontal: false
    flip_vertical: false
  vignette:
    method: radial_polynomial
    full_width: 1384
    full_height: 1032
    vgnt4: 2.0e-12
    vgnt2: -3.2e-06
    vgnt0: 1.0
    x_offset: 0
    y_offset: 340
    min_model_value: 1.0e-09
  analysis:
    energy_range:
    - 1.2
    - 1501.3
    num_energy_points: 1000
    calibration:
      kind: dnn_axis
      camera_calibration_file: data/HTT-MagSpce-Calibrations/260224DnnVarianCam.txt
      trajectory_calibration_file: data/HTT-MagSpce-Calibrations/170925DnnVarianTrj.txt
      lanex_calibration_file: data/HTT-MagSpce-Calibrations/250101lanexCalib.txt
      camera_number: 3
      magnetic_field_t: 0.2008
  pipeline:
    steps:
    - background
    - vignette
    - roi
    - thresholding
    - filtering
    - transforms
scan:
  priority: 1
  mode: per_shot
  save: true
  background_source:
    scan_number: 1
