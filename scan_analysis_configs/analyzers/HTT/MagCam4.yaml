name: HTT-C23_4_MagSpec4
image_analyzer: magspec_manual
image:
  description: High power mode imager
  camera_type: ebeam_profile
  bit_depth: 16
  background:
    enabled: true
    method: from_file
    additional_constant: 1.5
  thresholding:
    enabled: true
    method: constant
    value: 0.0
    mode: to_zero
    invert: false
  roi:
    x_min: 25
    x_max: 1384
    y_min: 20
    y_max: 170
  filtering:
    gaussian_sigma: null
    median_kernel_size: 5
  transforms:
    rotation_angle: 0.1
    flip_horizontal: false
    flip_vertical: false
  vignette:
    enabled: true
    method: radial_polynomial
    full_width: 1384
    full_height: 1032
    vgnt4: 1.2e-12
    vgnt2: -2.0e-06
    vgnt0: 1.0
    x_offset: 0
    y_offset: 420
    min_model_value: 1.0e-09
  analysis:
    energy_range:
    - 1.2
    - 1501.3
    num_energy_points: 1000
    calibration:
      kind: dnn_axis
      camera_calibration_file: data/HTT-MagSpce-Calibrations/260224DnnVarianCam.txt
      trajectory_calibration_file: data/HTT-MagSpce-Calibrations/170925DnnVarianTrj.txt
      lanex_calibration_file: data/HTT-MagSpce-Calibrations/250101lanexCalib.txt
      camera_number: 4
      magnetic_field_t: 0.2008
scan:
  priority: 1
  mode: per_shot
  save: true
  background_source:
    scan_number: 1
