name: HTT-C23_1_MagSpec1
image_analyzer: magspec_manual
image:
  description: High power mode imager
  camera_type: ebeam_profile
  bit_depth: 16
  background:
    enabled: true
    method: from_file
    additional_constant: 1.0
  thresholding:
    enabled: true
    method: constant
    value: 0.0
    mode: to_zero
    invert: false
  roi:
    x_min: 0
    x_max: 1357
    y_min: 1
    y_max: 600
  filtering:
    gaussian_sigma: null
    median_kernel_size: 5
  transforms:
    rotation_angle: 0.0
    flip_horizontal: false
    flip_vertical: false
  vignette:
    enabled: true
    method: radial_polynomial
    full_width: 1384
    full_height: 1032
    vgnt4: -4.0e-13
    vgnt2: -6.31e-07
    vgnt0: 1.0
    x_offset: 0
    y_offset: 170
    min_model_value: 1.0e-09
  analysis:
    energy_range:
    - 1.2
    - 1501.3
    num_energy_points: 1000
    calibration:
      kind: dnn_axis
      camera_calibration_file: data/HTT-MagSpce-Calibrations/260224DnnVarianCam.txt
      trajectory_calibration_file: data/HTT-MagSpce-Calibrations/170925DnnVarianTrj.txt
      lanex_calibration_file: data/HTT-MagSpce-Calibrations/250101lanexCalib.txt
      camera_number: 1
      magnetic_field_t: 0.2008
scan:
  priority: 1
  mode: per_shot
  save: true
  background_source:
    scan_number: 1
