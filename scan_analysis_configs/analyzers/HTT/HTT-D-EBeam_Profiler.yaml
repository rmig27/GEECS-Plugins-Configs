name: HTT-D-EBeam_Profiler
image_analyzer: image_analysis.analyzers.beam_analyzer.BeamAnalyzer
image:
  type: camera
  bit_depth: 16
  description: Beam profiler
  background:
    method: constant
    constant_level: 62
  metadata:
    location: B cave chamber
    notes: none
    spatial_calibration: 1
  thresholding:
    method: constant
    value: 0.0
    mode: to_zero
    invert: false
  roi:
    x_min: 125
    x_max: 450
    y_min: 100
    y_max: 400
  pipeline:
    steps:
    - roi
    - background
    - thresholding
scan:
  priority: 100
  mode: per_shot
  save: false
