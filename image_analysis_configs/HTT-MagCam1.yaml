# Configuration for "HTT-C44_1_dr_out camera

# Camera identification and properties
name: "HTT-C23_1_MagSpec1"
description: "High power mode imager"
camera_type: "ebeam_profile"
bit_depth: 16

# Camera identification and properties
background:
  enabled: true
  background_scan_number: 1   # whichever scan is your dark/background run
  method: from_file            # will be set automatically, but harmless to be explicit
#  enabled: true
#  method: from_file
#  file_path: 'Z:\data\Thomson\Y2026\04-Apr\26_0410\scans\Scan003\HTT-C23_1_MagSpec1\Scan003_HTT-C23_1_MagSpec1_004.png'
#  file_path: "{scan_dir}/computed_background.npy"
#  constant_level: 50.0  #fallback to this value if file not found
#  dynamic_computation:
#    enabled: true
#    method: percentile_dataset
#    percentile: 5.0
#    auto_save_path: "{scan_dir}/computed_background.npy"
  additional_constant: 1.0



# Thresholding configuration - NEW FEATURE
thresholding:
  enabled: true
  method: "constant"  # Use percentage of max value
  value: 0.0               # 10% of maximum pixel value
  mode: "to_zero"            # Binary thresholding
  invert: false             # Don't invert

roi:
  x_min: 0 # Original left_ROI
  x_max: 1357  # left_ROI + roi_width (175 + 800)
  y_min: 1  # Original top_ROI
  y_max: 600  # top_ROI + roi_height (100 + 800)

# Image filtering configuration
filtering:
  gaussian_sigma: null      # No filtering in original
  median_kernel_size: 5  # No filtering in original
#
# Geometric transformations
transforms:
  rotation_angle: 0.0       # Original rotate value
  flip_horizontal: false
  flip_vertical: false

vignette:
  enabled: true
  method: radial_polynomial

  # From LANEX calibration table, set 6:
  full_width: 1384
  full_height: 1032
  vgnt4: -4.0e-13
  vgnt2: -6.31e-7
  vgnt0: 1.0

  # From camera saved-image ROI offsets (NOT from LANEX table):
  x_offset: 0
  y_offset: 170
  min_model_value: 1.0e-9

analysis:
  energy_range: [1.2, 1501.3]
  num_energy_points: 1000
  calibration:
    kind: dnn_axis
    camera_calibration_file: "data/HTT-MagSpce-Calibrations/260224DnnVarianCam.txt"
    trajectory_calibration_file: "data/HTT-MagSpce-Calibrations/170925DnnVarianTrj.txt"
    lanex_calibration_file: "data/HTT-MagSpce-Calibrations/250101lanexCalib.txt"
    camera_number: 1
    magnetic_field_t: 0.2008
