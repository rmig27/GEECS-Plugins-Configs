# Configuration for UC_DonDSampleArea camera

name: UC_DonDSampleArea
bit_depth: 16
description: Target area image of ebeam profile imaged on LANEX

# Camera identification and properties
background:
  enabled: true
  method: from_file
  file_path: "Z:/data/Undulator/Y2025/11-Nov/25_1126/analysis/Scan002UC_DonDSampleArea_averaged.png"
  constant_level: 50.0  #fallback to this value if file not found
#  dynamic_computation:
#    enabled: true
#    method: percentile_dataset
#    percentile: 5.0
#    auto_save_path: "{scan_dir}/computed_background.npy"
# additional_constant: 50

metadata:
  location: "B-cave"
  notes: "none"
  spatial_calibration: 35e-6  #meters

roi:
  x_min: 200
  x_max: 700
  y_min: 300
  y_max: 700

# Thresholding configuration - NEW FEATURE
thresholding:
  enabled: true
  method: "constant"  # Use percentage of max value
  value: 50           # 10% of maximum pixel value
  mode: "to_zero"            # Binary thresholding
  invert: false             # Don't invert

filtering:
  gaussian_sigma: null
  median_kernel_size: 3

normalization:
  enabled: false
  method:  "distribute_value"
  constant_value: 1

