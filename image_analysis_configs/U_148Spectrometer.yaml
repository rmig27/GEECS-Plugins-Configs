
name: "U_148Spectrometer"
description: "spectrometer oscilloscope traces"
data_format: "intensity (arb) vs wavelength (nm)"

# Data loading configuration
data_loading:
  data_type: "tdms_scope"
  x_trace_index: 0
  trace_index: 1

# Data type settings
processing_dtype: "float64"
storage_dtype: "float32"

# Background subtraction configuration
background:
  method: "constant"
  constant_value: 0.0

# Filtering configuration
filtering:
  method: "none"

# Thresholding configuration
thresholding:
  method: "none"

roi:
  x_min: 700
  x_max: 900

# Pipeline configuration - empty for ICT (handled by analyzer)
pipeline:
  steps: ['roi']

