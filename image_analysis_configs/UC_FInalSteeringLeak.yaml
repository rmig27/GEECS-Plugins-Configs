# Configuration for UC_FInalSteeringLeak camera

name: UC_FInalSteeringLeak
bit_depth: 16
description: IR leaking through final steering mirror

# Camera identification and properties
background:
  enabled: true
  method: constant
  constant_level: 30.0

metadata:
  location: "Room 148"
  notes: "none"
  spatial_calibration: 2.44e-05

roi:
  x_min: 1
  x_max: 300
  y_min: 350
  y_max: 750


  # Thresholding configuration
thresholding:
  enabled: true
  method: "constant"  # Use percentage of max value
  value: 0.0               # 10% of maximum pixel value
  mode: "to_zero"            # Binary thresholding
  invert: false             # Don't invert