# Configuration for U_FROG_Grenouille-Temporal camera

name: U_FROG_Grenouille-Temporal
bit_depth: 16
description: image of target chamber output port

# Camera identification and properties
background:
  enabled: true
  method: from_file
  file_path: "{scan_dir}/computed_background.npy"
  constant_level: 50.0  #fallback to this value if file not found
  dynamic_computation:
    enabled: true
    method: percentile_dataset
    percentile: 5.0
    auto_save_path: "{scan_dir}/computed_background.npy"
  additional_constant: 1

metadata:
  location: "148"
  notes: "none"
  spatial_calibration: 2.44e-05

# Thresholding configuration - NEW FEATURE
thresholding:
  enabled: true
  method: "constant"  # Use percentage of max value
  value: 0.0               # 10% of maximum pixel value
  mode: "to_zero"            # Binary thresholding
  invert: false             # Don't invert

filtering:
  gaussian_sigma: null
  median_kernel_size: 5

grenouille_analysis_params:
  delt: 0.85
  dellam: -0.085
  lam0: 400.0
  N: 512 # acceptable values: 512, 256, 128, 64
  target_error: 0.0001
  max_time_seconds: 15