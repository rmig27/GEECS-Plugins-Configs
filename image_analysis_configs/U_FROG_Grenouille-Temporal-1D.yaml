name: "U_FROG_Grenouille-Temporal"
description: "BCave ICT charge measurement from oscilloscope traces"
data_format: "sig (arb) vs time (fs)"

# Data loading configuration
data_loading:
  data_type: "tsv"
  x_column: 0
  y_column: 1

# Data type settings
processing_dtype: "float64"
storage_dtype: "float32"

# Background subtraction configuration
background:
  method: "constant"
  constant_value: 0.0

# Filtering configuration
filtering:
  method: "none"

# Thresholding configuration
thresholding:
  method: "none"

roi:
  x_min: -200
  x_max: 200

interpolation:
  enabled: true
  x_min: -175
  x_max: 175
  num_points: 300

# Pipeline configuration - empty for ICT (handled by analyzer)
pipeline:
  steps: ['roi','interpolation']