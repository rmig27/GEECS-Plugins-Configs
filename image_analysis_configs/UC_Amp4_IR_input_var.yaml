# Configuration for UC_Amp4_IR_input camera

name: UC_Amp4_IR_input
bit_depth: 16
description: Image analyzer to calcuate basic statistics of the IR laser beam profile at the input to amp4.

# Camera identification and properties
background:
  enabled: true
  method: from_file
  file_path: "{scan_dir}/computed_background.npy"
  constant_level: 50.0  #fallback to this value if file not found
  dynamic_computation:
    enabled: true
    method: percentile_dataset
    percentile: 15.0
    auto_save_path: "{scan_dir}/computed_background.npy"
  additional_constant: 10

metadata:
  location: "Room 148"
  notes: "none"
  spatial_calibration: 2.44e-05

roi:
  x_max: 600
  x_min: 1
  y_max: 600
  y_min: 1

  # Thresholding configuration
thresholding:
  enabled: true
  method: "constant"  # Use percentage of max value
  value: 0.0               # 10% of maximum pixel value
  mode: "to_zero"            # Binary thresholding
  invert: false             # Don't invert
