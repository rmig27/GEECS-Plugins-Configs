# Configuration for U_BCaveMagSpec camera
name: U_BCaveMagSpec
bit_depth: 16
description: B-Cave magnetic spectrometer camera for electron beam profiling

#background:
#  enabled: true
#  method: from_file
#  file_path: "{scan_dir}/computed_background.npy"
#  constant_level: 100.0  #fallback to this value if file not found
#  dynamic_computation:
#    enabled: true
#    method: percentile_dataset
#    percentile: 15.0
#    auto_save_path: "{scan_dir}/computed_background.npy"
#  additional_constant: 2

# Camera identification and properties
background:
  enabled: true
  method: constant
  constant_level: 100.0

crosshair_masking:
  crosshairs: []
  enabled: false

filtering:
  gaussian_sigma: null
  median_kernel_size: null

metadata:
  location: B-cave
  notes: "NA"
  spatial_calibration: 2.217e-05

roi:
  x_max: 200
  x_min: 1
  y_max: 180
  y_min: 1

thresholding:
  enabled: true
  invert: false
  method: constant
  mode: to_zero
  value: 0.0
