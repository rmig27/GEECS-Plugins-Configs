name: U_FROG_Grenouille-SpectralPhase
description: FROG retrieved spectral phase, polynomial fit with intensity weighting

data_loading:
  data_type: "tsv"
  delimiter: "\t"
  x_column: 3            # wavelength_nm
  y_column: 5            # spectral_phase (rad)
  auxiliary_columns:
    weights: 4           # spectral_intensity, used for weighted fit + threshold mask

processing_dtype: "float64"
storage_dtype: "float32"

background:
  method: "none"

filtering:
  method: "none"

thresholding:
  method: "none"

roi:
  x_min: 750.0
  x_max: 850.0

# Do not enable interpolation here — aux columns + interpolation raises.
# ROI is the only pipeline step the aux column flows through.
pipeline:
  steps:
    - "roi"

x_units: nm
y_units: rad

analysis:
  fit_order: 3
  mask_threshold: 0.5
  reference_wavelength_nm: 800.0
  sign_reference_order: 2     # GDD term resolves FROG +/- phi ambiguity
  sign_reference: 1.0
