# BCave ICT (Integrated Current Transformer) Configuration
# Configuration for measuring charge from oscilloscope traces using ICT1DAnalyzer

name: "U_BCaveICT"
description: "BCave ICT charge measurement from oscilloscope traces"
data_format: "volts (V) vs time (s)"

# Data loading configuration
data_loading:
  data_type: "tdms_scope"
  trace_index: 0

# Data type settings
processing_dtype: "float64"
storage_dtype: "float32"

# Background subtraction configuration
background:
  method: "constant"
  constant_value: 0.0

# Filtering configuration
filtering:
  method: "none"

# Thresholding configuration
thresholding:
  method: "none"

# Pipeline configuration - empty for ICT (handled by analyzer)
pipeline:
  steps: []

# ICT-specific analysis configuration
analysis:
  butterworth_order: 1
  butterworth_crit_f: 0.125
  calibration_factor: 0.2
  dt: 4e-9
