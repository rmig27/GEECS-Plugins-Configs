# Configuration for HTT-P-TC_Pointing camera

name: HTT-P-TC_Pointing
bit_depth: 16
description: IR mode at the input to amp3

# Camera identification and properties
background:
  enabled: true
  method: constant
  constant_level: 60.0

metadata:
  location: "Room 148"
  notes: "none"
  spatial_calibration: 2.44e-05

#roi:
#  x_max: 500
#  x_min: 1
#  y_max: 500
#  y_min: 1

circular_mask:
  enabled: true
  center: [600,500]
  radius: 300

filtering:
  gaussian_sigma: null
  median_kernel_size: 3

  # Thresholding configuration
thresholding:
  enabled: true
  method: "constant"  # Use percentage of max value
  value: 0.0               # 10% of maximum pixel value
  mode: "to_zero"            # Binary thresholding
  invert: false             # Don't invert
