vocs:
  variables:
    U_S2V:Current: [-1.5, 1.0]
    U_EMQTripletBipolar:Current_Limit.Ch2: [-0.85, -0.55]
  objectives: {}
  observables:
    - y_CoM

evaluator:
  module: geecs_scanner.optimization.evaluators.beam_position_evaluator
  class: BeamPositionEvaluator

  kwargs:
    observable_names: ["y_CoM"]

    analyzers:
      - device_name: UC_ALineEBeam3
        analyzer_type: Array2DScanAnalyzer
        file_tail: .png
        image_analyzer:
          module: image_analysis.analyzers.beam_analyzer
          class: BeamAnalyzer
          kwargs: {camera_config_name: UC_ALineEBeam3}
        analysis_mode: per_bin

generator:
  name: multipoint_bax_alignment_l2

xopt_config_overrides:
  multipoint_bax_alignment_l2:
    control_names: ["U_S2V:Current"]
    measurement_name: "U_EMQTripletBipolar:Current_Limit.Ch2"
    observable_names: ["y_CoM"]
    probe_nominal: -0.70
    probe_grid_absolute: [-0.1, 0.0, 0.1]
    n_control_mesh: 21
    mesh_measurement: true
    n_measurement_mesh: 5
    n_monte_carlo_samples: 32
    use_low_noise_prior: false