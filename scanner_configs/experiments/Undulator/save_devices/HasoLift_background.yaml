Devices:
  U_ESP_JetXYZ:
    add_all_variables: false
    save_nonscalar_data: false
    synchronous: false
    variable_list:
    - Position.Axis 1
    - Position.Axis 2
    - Position.Axis 3
  U_HasoLift:
    save_nonscalar_data: true
    synchronous: true
    variable_list: []
  U_ModeImagerESP:
    add_all_variables: false
    save_nonscalar_data: false
    synchronous: false
    variable_list:
    - Position.Axis 3
  U_ProbeCamStage:
    add_all_variables: false
    save_nonscalar_data: false
    synchronous: false
    variable_list:
    - Position
closeout_action:
  steps:
  - action: set
    device: U_ModeImagerESP
    value: 10
    variable: Position.Axis 3
    wait_for_execution: true
setup_action:
  steps:
  - action: set
    device: U_ModeImagerESP
    value: 2.0
    variable: Position.Axis 3
    wait_for_execution: true
